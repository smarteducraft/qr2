<!doctype html>
<html lang="ko">
<!--
QR 스캐너 (Happy Together)

버전 히스토리
V1.03
- ROI 크롭/다운스케일/프레임 콜백 기반 스캔
- 드래그/핀치 줌(지원 기기에서)

V1.05
- Windows: 전체화면 전환 비활성(창 크기 유지)
- Windows: BarcodeDetector 미지원 시 jsQR 폴백으로 인식 가능
- 권한 팝업 유도 강화: 시작 클릭 즉시 권한 요청 + 실패 시 재요청 버튼
- 카메라 2대 이상일 때만 카메라 선택 UI 표시
- 인식률 개선: 가변 ROI(중앙→확장→전체) + 다중 해상도 패스
- (지원 시) 토치(플래시) 토글
- 줌: 하드웨어 줌(지원 시) + 디지털 줌(폴백) + PC 휠/드래그
-->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR 스캐너 (Happy Together) V1.05</title>

  <style>
    html,body{ margin:0; padding:0; height:100%; background:#000; color:#fff; }
    #app{ height:100%; width:100%; position:relative; overflow:hidden; }
    video{
      width:100%; height:100%;
      object-fit:cover; background:#000; display:block;
      touch-action:none;
    }

    #tapToStart{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.55);
      font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
      text-align:center;
      padding:24px;
      z-index:5;
    }
    #tapToStart button{
      border:0; border-radius:12px; padding:14px 18px;
      font-weight:800; font-size:16px; cursor:pointer;
      margin:6px;
    }
    .btnSub{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }

    #hud{
      position:absolute; left:0; right:0; bottom:0;
      padding:10px 12px;
      background:linear-gradient(transparent,rgba(0,0,0,.6));
      font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
      font-size:13px; line-height:1.35;
      user-select:none;
      z-index:4;
    }
    #status{ font-weight:800; }
    #subline{ opacity:.9; margin-top:6px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    select, button.small{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      outline:none;
    }
    button.small{ cursor:pointer; }
    #zoomInfo{ opacity:.9; font-size:12px; margin-top:6px; }
    #hint{ opacity:.9; font-size:12px; margin-top:6px; }
  </style>
</head>

<body>
  <div id="app">
    <video id="video" playsinline muted></video>

    <div id="tapToStart">
      <div>
        <div style="font-size:18px;font-weight:900;margin-bottom:10px;">
          QR 스캐너 (Happy Together)
        </div>
        <div style="opacity:.9;margin-bottom:14px;">
          카메라 권한이 필요합니다. 아래 버튼을 눌러 시작하세요.
        </div>
        <button id="startBtn">스캔 시작</button>
        <button id="retryBtn" class="btnSub" style="display:none;">권한 다시 요청</button>
        <div id="startMsg" style="opacity:.85;margin-top:10px;font-size:12px;line-height:1.4;"></div>
      </div>
    </div>

    <div id="hud">
      <div id="status">대기 중…</div>
      <div id="subline">
        <select id="cameraSelect" title="카메라 선택" style="min-width:180px; max-width:60vw; display:none;"></select>
        <button id="torchBtn" class="small" style="display:none;">토치 OFF</button>
        <button id="fsBtn" class="small" style="display:none;">전체화면</button>
      </div>
      <div id="zoomInfo"></div>
      <div id="hint"></div>
    </div>
  </div>

<script>
/* ==========================
버전 (표기 1/3)
========================== */
const APP_VERSION = "V1.05";

/* ==========================
기본 설정(유지)
========================== */
const COOLDOWN_MS = 1500;
const HISTORY_KEY = "qr_scan_history_v1";
const MAX_HISTORY = 8;
const BASE_URL = "";

/* ==========================
인식률/성능 (최대한 활용)
========================== */
const TARGET_SCAN_FPS = 18;
const ROI_STEPS = [0.62, 0.82, 1.00];
const PASS_MAX_SIDES = [1080, 720];

const DIGITAL_ZOOM_MIN = 1.0;
const DIGITAL_ZOOM_MAX = 4.0;

/* ==========================
요소
========================== */
const video = document.getElementById("video");
const statusEl = document.getElementById("status");
const zoomInfoEl = document.getElementById("zoomInfo");
const hintEl = document.getElementById("hint");

const tapLayer = document.getElementById("tapToStart");
const startBtn = document.getElementById("startBtn");
const retryBtn = document.getElementById("retryBtn");
const startMsg = document.getElementById("startMsg");

const cameraSelect = document.getElementById("cameraSelect");
const torchBtn = document.getElementById("torchBtn");
const fsBtn = document.getElementById("fsBtn");

/* ==========================
환경 감지: Windows에서는 전체화면 전환 X
========================== */
const IS_WINDOWS = (() => {
  const p = (navigator.platform || "").toLowerCase();
  const ua = (navigator.userAgent || "").toLowerCase();
  return p.includes("win") || ua.includes("windows");
})();

/* ==========================
진동+효과음(유지)
========================== */
let audioCtx = null;
function vibrate(){ if(navigator.vibrate) navigator.vibrate([80,60,80]); }
function beep(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const A = audioCtx;
    const o = A.createOscillator();
    const g = A.createGain();
    o.type = "sine"; o.frequency.value = 880;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(A.destination);
    const t = A.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    o.start(t); o.stop(t + 0.13);
  }catch(e){}
}

/* ==========================
유틸
========================== */
function pushHistory(text){
  const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  const next = [text, ...arr.filter(x => x !== text)].slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
}
function makeUrl(raw){
  const v = (raw || "").trim();
  if(!v) return null;
  if(/^https?:\/\//i.test(v)) return v;
  if(/^[\w.-]+\.[a-z]{2,}([\/?#].*)?$/i.test(v)) return "https://" + v;
  if(!BASE_URL) return null;
  return BASE_URL + encodeURIComponent(v);
}
function setStatus(msg){ statusEl.textContent = msg; }
function clamp(v,min,max){ return Math.min(max, Math.max(min, v)); }

/* ==========================
전체화면
- Windows에서는 사용하지 않음(창 크기 유지)
========================== */
async function requestFullscreen(){
  if(IS_WINDOWS) return;
  const el = document.documentElement;
  try{
    if(!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
  }catch(e){}
}
fsBtn.addEventListener("click", () => requestFullscreen());

/* ==========================
QR 디코더
- 1) BarcodeDetector(있으면 사용)
- 2) 미지원 시 jsQR 폴백(Windows에서 특히 유용)
========================== */
let detector = null;

function initBarcodeDetector(){
  if(!("BarcodeDetector" in window)) return false;
  try{
    detector = new BarcodeDetector({ formats:["qr_code"] });
    return true;
  }catch(e){
    detector = null;
    return false;
  }
}

function loadJsQR(){
  return new Promise((resolve, reject) => {
    if(window.jsQR){ resolve(true); return; }
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js";
    s.onload = () => resolve(true);
    s.onerror = () => reject(new Error("jsQR load failed"));
    document.head.appendChild(s);
  });
}

async function initDecoder(){
  const okBD = initBarcodeDetector();
  if(okBD){
    hintEl.textContent = "디코더: BarcodeDetector";
    return true;
  }

  try{
    await loadJsQR();
    hintEl.textContent = "디코더: jsQR(폴백)";
    return true;
  }catch(e){
    hintEl.textContent = "디코더 로드 실패: 인터넷 연결 또는 브라우저 지원을 확인하세요.";
    return false;
  }
}

/* ==========================
카메라 목록 (2대 이상일 때만 선택 UI 표시)
========================== */
async function listCameras(){
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");
    cameraSelect.innerHTML = "";

    if(cams.length <= 1){
      cameraSelect.style.display = "none";
      return;
    }

    cameraSelect.style.display = "";
    cams.forEach((cam, idx) => {
      const opt = document.createElement("option");
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `카메라 ${idx+1}`;
      cameraSelect.appendChild(opt);
    });

    const backIdx = cams.findIndex(c => /back|rear|후면/i.test(c.label));
    if(backIdx >= 0) cameraSelect.selectedIndex = backIdx;

  }catch(e){
    cameraSelect.style.display = "none";
  }
}

/* ==========================
카메라 시작/정리
- 시작 클릭 즉시 권한 요청
- 실패 시 재요청 버튼 표시
========================== */
let stream = null;
let videoTrack = null;
let navigating = false;

async function startCamera(deviceId){
  stopAll();

  try{
    const constraints = {
      video: {
        ...(deviceId ? { deviceId: { exact: deviceId } } : { facingMode: { ideal: "environment" } }),
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        frameRate: { ideal: 30, max: 60 },
        focusMode: "continuous"
      },
      audio: false
    };

    stream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = stream;
    await video.play();

    await listCameras();
    if(deviceId && cameraSelect.style.display !== "none") cameraSelect.value = deviceId;

    setupCameraControls();
    startScanningLoop();

    setStatus("스캔 중… (모바일: 핀치/드래그, PC: 휠/드래그 줌)");
    retryBtn.style.display = "none";
    startMsg.textContent = "";

  }catch(e){
    const name = e?.name || "";
    if(name === "NotAllowedError" || name === "SecurityError"){
      setStatus("카메라 권한이 필요합니다.");
      startMsg.innerHTML =
        `주소창 왼쪽의 <b>🔒(또는 카메라 아이콘)</b>에서 카메라 권한을 <b>허용</b>으로 바꾼 뒤<br/>아래 <b>권한 다시 요청</b>을 눌러주세요.`;
    }else{
      setStatus("카메라 실행 실패: 장치/HTTPS/권한 확인");
      startMsg.textContent = "카메라 연결, HTTPS 실행 여부를 확인하세요.";
    }
    retryBtn.style.display = "";
  }
}

function stopAll(){
  navigating = false;
  scanning = false;

  torchBtn.style.display = "none";
  zoomInfoEl.textContent = "";

  if(stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  video.srcObject = null;
}

/* ==========================
스캔 루프 (인식률 최우선)
- ROI 단계 + 다중 해상도
- BarcodeDetector 또는 jsQR
========================== */
let scanning = false;
let lastScanTs = 0;
let lastValue = "";
let lastTime = 0;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });

let digitalZoom = 1.0;

function startScanningLoop(){
  if(scanning) return;
  scanning = true;
  lastScanTs = 0;

  const useRVFC = typeof video.requestVideoFrameCallback === "function";

  const tick = async (nowMs) => {
    if(!scanning || navigating) return;
    if(!video.videoWidth || !video.videoHeight){
      scheduleNext();
      return;
    }

    const minInterval = 1000 / TARGET_SCAN_FPS;
    if(nowMs - lastScanTs < minInterval){
      scheduleNext();
      return;
    }
    lastScanTs = nowMs;

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    let found = null;

    for(const passMaxSide of PASS_MAX_SIDES){
      for(const baseRatio of ROI_STEPS){
        const ratio = Math.min(1.0, baseRatio / digitalZoom);

        const roiW = Math.max(1, Math.floor(vw * ratio));
        const roiH = Math.max(1, Math.floor(vh * ratio));
        const sx = Math.floor((vw - roiW) / 2);
        const sy = Math.floor((vh - roiH) / 2);

        const maxSide = Math.min(passMaxSide, Math.max(roiW, roiH));
        const scale = maxSide / Math.max(roiW, roiH);
        const dw = Math.max(1, Math.floor(roiW * scale));
        const dh = Math.max(1, Math.floor(roiH * scale));

        canvas.width = dw;
        canvas.height = dh;
        ctx.drawImage(video, sx, sy, roiW, roiH, 0, 0, dw, dh);

        if(detector){
          try{
            const codes = await detector.detect(canvas);
            if(codes && codes.length){
              const raw = (codes[0].rawValue || "").trim();
              if(raw){ found = raw; break; }
            }
          }catch(e){}
        }else if(window.jsQR){
          try{
            const img = ctx.getImageData(0, 0, dw, dh);
            const r = window.jsQR(img.data, dw, dh, { inversionAttempts: "attemptBoth" });
            if(r && r.data){
              found = (r.data || "").trim();
              if(found) break;
            }
          }catch(e){}
        }
      }
      if(found) break;
    }

    if(found){
      const now = Date.now();
      if(found !== lastValue || (now - lastTime) >= COOLDOWN_MS){
        lastValue = found;
        lastTime = now;

        pushHistory(found);

        const url = makeUrl(found);
        vibrate(); beep();

        if(!url){
          setStatus("인식 성공! 그러나 URL 변환 실패 (BASE_URL 설정 필요)");
          scheduleNext();
          return;
        }

        navigating = true;
        setStatus("이동 중…");
        location.href = url;
        return;
      }
    }

    scheduleNext();
  };

  const scheduleNext = () => {
    if(!scanning || navigating) return;
    if(useRVFC){
      video.requestVideoFrameCallback((_, meta) => {
        const t = meta?.mediaTime ? meta.mediaTime * 1000 : performance.now();
        tick(t);
      });
    }else{
      requestAnimationFrame((t) => tick(t));
    }
  };

  scheduleNext();
}

/* ==========================
줌/토치 컨트롤
- 하드웨어 줌 지원: applyConstraints zoom
- 미지원: 디지털 줌(digitalZoom)
- PC: 마우스 휠 줌
========================== */
let zoomCaps = null;
let zoomValue = null;
let torchCaps = false;
let torchOn = false;

function setupCameraControls(){
  if(!stream) return;
  videoTrack = stream.getVideoTracks()[0];

  zoomCaps = null; zoomValue = null;
  torchCaps = false; torchOn = false;

  try{
    if(videoTrack && typeof videoTrack.getCapabilities === "function"){
      const caps = videoTrack.getCapabilities();
      if(caps && caps.zoom){
        zoomCaps = caps.zoom;
        const st = (typeof videoTrack.getSettings === "function") ? videoTrack.getSettings() : {};
        zoomValue = (st && typeof st.zoom === "number") ? st.zoom : (zoomCaps.min || 1);
        applyHardwareZoom(zoomValue);
      }
      torchCaps = !!caps?.torch;
    }
  }catch(e){}

  if(torchCaps){
    torchBtn.style.display = "";
    torchBtn.textContent = "토치 OFF";
    torchBtn.onclick = async () => {
      torchOn = !torchOn;
      try{
        await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
        torchBtn.textContent = torchOn ? "토치 ON" : "토치 OFF";
      }catch(e){
        torchOn = !torchOn;
      }
    };
  }else{
    torchBtn.style.display = "none";
  }

  fsBtn.style.display = IS_WINDOWS ? "none" : "";

  updateZoomInfo();
  enableZoomGestures();
}

function quantizeHardwareZoom(v){
  if(!zoomCaps) return v;
  const step = zoomCaps.step || 0.1;
  const q = Math.round(v / step) * step;
  return clamp(q, zoomCaps.min, zoomCaps.max);
}

async function applyHardwareZoom(v){
  if(!videoTrack || !zoomCaps) return;
  zoomValue = quantizeHardwareZoom(v);
  try{
    await videoTrack.applyConstraints({ advanced: [{ zoom: zoomValue }] });
    updateZoomInfo();
  }catch(e){
    zoomCaps = null;
    zoomValue = null;
    updateZoomInfo();
  }
}

function applyDigitalZoom(z){
  digitalZoom = clamp(z, DIGITAL_ZOOM_MIN, DIGITAL_ZOOM_MAX);
  updateZoomInfo();
}

function updateZoomInfo(){
  const hw = zoomCaps ? `하드웨어 줌: ${zoomValue.toFixed(2)}` : "하드웨어 줌: 미지원";
  const dz = `디지털 줌: ${digitalZoom.toFixed(2)}`;
  zoomInfoEl.textContent = `${hw} · ${dz}  |  모바일: 핀치/드래그, PC: 휠/드래그`;
}

/* 포인터 제스처 + 휠 */
const pointers = new Map();
let startZoomHW = null;
let startZoomDZ = null;
let startDist = null;
let startY = null;

function distance(a,b){
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.hypot(dx,dy);
}

function enableZoomGestures(){
  video.onpointerdown = null;
  video.onpointermove = null;
  video.onpointerup = null;
  video.onpointercancel = null;
  video.onpointerleave = null;

  video.addEventListener("pointerdown", (e) => {
    video.setPointerCapture?.(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    startZoomHW = zoomValue;
    startZoomDZ = digitalZoom;

    if(pointers.size === 1){
      startY = e.clientY;
      startDist = null;
    }else if(pointers.size === 2){
      const pts = Array.from(pointers.values());
      startDist = distance(pts[0], pts[1]);
      startY = null;
    }
  });

  video.addEventListener("pointermove", (e) => {
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if(pointers.size === 1 && startY != null){
      const dy = startY - e.clientY;
      const delta = dy / 260;
      if(zoomCaps){
        const range = (zoomCaps.max - zoomCaps.min);
        applyHardwareZoom((startZoomHW ?? zoomValue ?? zoomCaps.min) + range * delta * 0.35);
      }else{
        applyDigitalZoom((startZoomDZ ?? digitalZoom) + delta * 0.9);
      }
    }

    if(pointers.size === 2 && startDist != null){
      const pts = Array.from(pointers.values());
      const d = distance(pts[0], pts[1]);
      const ratio = d / startDist;
      if(zoomCaps){
        applyHardwareZoom((startZoomHW ?? zoomValue ?? zoomCaps.min) * ratio);
      }else{
        applyDigitalZoom((startZoomDZ ?? digitalZoom) * ratio);
      }
    }
  });

  const end = (e) => {
    pointers.delete(e.pointerId);
    if(pointers.size < 2) startDist = null;
    if(pointers.size === 0){ startY = null; startDist = null; }
  };

  video.addEventListener("pointerup", end);
  video.addEventListener("pointercancel", end);
  video.addEventListener("pointerleave", end);

  video.onwheel = (e) => {
    e.preventDefault();
    const dir = Math.sign(e.deltaY);
    if(zoomCaps){
      const step = zoomCaps.step || 0.1;
      applyHardwareZoom((zoomValue ?? zoomCaps.min) + dir * step);
    }else{
      applyDigitalZoom(digitalZoom + dir * 0.12);
    }
  };
}

/* ==========================
카메라 전환
========================== */
cameraSelect.addEventListener("change", async () => {
  const id = cameraSelect.value;
  if(!id) return;
  await startCamera(id);
});

/* ==========================
권한 재요청 버튼
========================== */
retryBtn.addEventListener("click", async () => {
  retryBtn.style.display = "none";
  startMsg.textContent = "";
  await startFlow();
});

/* ==========================
시작 흐름
========================== */
async function startFlow(){
  await requestFullscreen();

  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") await audioCtx.resume();
  }catch(e){}

  const okDecoder = await initDecoder();
  if(!okDecoder){
    setStatus("QR 인식 준비 실패");
    retryBtn.style.display = "";
    return;
  }

  await listCameras();

  tapLayer.style.display = "none";

  await startCamera(cameraSelect.style.display === "none" ? "" : (cameraSelect.value || ""));
}

startBtn.addEventListener("click", startFlow);

tapLayer.addEventListener("click", (e) => {
  if(e.target === startBtn || e.target === retryBtn) return;
  startBtn.click();
});

listCameras();

window.addEventListener("beforeunload", stopAll);
</script>
</body>
</html>
