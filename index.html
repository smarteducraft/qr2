<!doctype html>
<html lang="ko">
<!--
QR 스캐너 (Happy Together)

버전 히스토리
V1.03
- ROI 크롭/다운스케일/프레임 콜백 기반 스캔
- 드래그/핀치 줌(지원 기기에서)

V1.05
- Windows: 전체화면 전환 비활성(창 크기 유지)
- Windows: BarcodeDetector 미지원 시 jsQR 폴백으로 인식 가능
- 권한 팝업 유도 강화: 시작 클릭 즉시 권한 요청 + 실패 시 재요청 버튼
- 카메라 2대 이상일 때만 카메라 선택 UI 표시
- 인식률 개선: 가변 ROI(중앙→확장→전체) + 다중 해상도 패스
- (지원 시) 토치(플래시) 토글
- 줌: 하드웨어 줌(지원 시) + 디지털 줌(폴백) + PC 휠/드래그

V1.06
- Windows: 카메라 반전(좌/우, 상/하) 토글 버튼 추가
- 반전 상태 localStorage 저장(유지)
- 미리보기(video)와 인식(canvas) 모두 동일 반전 적용

V1.07
- ✅ 교육용 태블릿 인식률 최대화: "고해상도 우선" 다단계 getUserMedia 시도(1080p→720p→기본)
- ✅ 실제 적용 해상도 진단/재시도: 낮은 해상도(예: 640x480)로 붙으면 자동 재요청
- ✅ 가능한 경우 카메라 트랙 applyConstraints로 고해상도/연속초점/노출/화이트밸런스 보강
- ✅ 캔버스 전처리(대비/밝기) 적용: BarcodeDetector/jsQR 모두 draw 단계에서 강화
-->
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>QR 스캐너 V1.07</title>

  <style>
    html,body{ margin:0; padding:0; height:100%; background:#000; color:#fff; }
    #app{ height:100%; width:100%; position:relative; overflow:hidden; }
    video{
      width:100%; height:100%;
      object-fit:cover; background:#000; display:block;
      touch-action:none;
      transform-origin:center center;
    }

    #tapToStart{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(0,0,0,.55);
      font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
      text-align:center;
      padding:24px;
      z-index:5;
    }
    #tapToStart button{
      border:0; border-radius:12px; padding:14px 18px;
      font-weight:800; font-size:16px; cursor:pointer;
      margin:6px;
    }
    .btnSub{
      background:rgba(255,255,255,.12);
      color:#fff;
      border:1px solid rgba(255,255,255,.18);
    }

    #hud{
      position:absolute; left:0; right:0; bottom:0;
      padding:10px 12px;
      background:linear-gradient(transparent,rgba(0,0,0,.6));
      font-family:system-ui,-apple-system,"Noto Sans KR",sans-serif;
      font-size:13px; line-height:1.35;
      user-select:none;
      z-index:4;
    }
    #status{ font-weight:800; }
    #subline{ opacity:.9; margin-top:6px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    select, button.small{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      color:#fff;
      border-radius:10px;
      padding:8px 10px;
      font-size:12px;
      outline:none;
    }
    button.small{ cursor:pointer; }
    #zoomInfo{ opacity:.9; font-size:12px; margin-top:6px; }
    #hint{ opacity:.9; font-size:12px; margin-top:6px; }
  </style>
</head>

<body>
  <div id="app">
    <video id="video" playsinline muted></video>

    <div id="tapToStart">
      <div>
        <div style="font-size:18px;font-weight:900;margin-bottom:10px;">
          QR 스캐너 (Happy Together)
        </div>
        <div style="opacity:.9;margin-bottom:14px;">
          카메라 권한이 필요합니다. 아래 버튼을 눌러 시작하세요.
        </div>
        <button id="startBtn">스캔 시작</button>
        <button id="retryBtn" class="btnSub" style="display:none;">권한 다시 요청</button>
        <div id="startMsg" style="opacity:.85;margin-top:10px;font-size:12px;line-height:1.4;"></div>
      </div>
    </div>

    <div id="hud">
      <div id="status">대기 중…</div>
      <div id="subline">
        <select id="cameraSelect" title="카메라 선택" style="min-width:180px; max-width:60vw; display:none;"></select>
        <button id="torchBtn" class="small" style="display:none;">토치 OFF</button>

        <!-- ✅ Windows에서만 표시될 반전 버튼 -->
        <button id="flipHBtn" class="small" style="display:none;">좌/우 반전: OFF</button>
        <button id="flipVBtn" class="small" style="display:none;">상/하 반전: OFF</button>
        <button id="flipResetBtn" class="small" style="display:none;">반전 초기화</button>

        <button id="fsBtn" class="small" style="display:none;">전체화면</button>
      </div>
      <div id="zoomInfo"></div>
      <div id="hint"></div>
    </div>
  </div>

<script>
/* ==========================
버전 (표기 1/3)
========================== */
const APP_VERSION = "V1.07";

/* ==========================
기본 설정(유지)
========================== */
const COOLDOWN_MS = 1500;
const HISTORY_KEY = "qr_scan_history_v1";
const MAX_HISTORY = 8;
const BASE_URL = "";

/* ==========================
인식률/성능 (최대한 활용)
========================== */
const TARGET_SCAN_FPS = 18;
const ROI_STEPS = [0.62, 0.82, 1.00];
const PASS_MAX_SIDES = [1080, 720];

const DIGITAL_ZOOM_MIN = 1.0;
const DIGITAL_ZOOM_MAX = 4.0;

/* ==========================
✅ 교육용 태블릿 인식률 최대화 옵션
- 저해상도(640x480 등)로 붙는 기기 1대 대응
========================== */
const PREFERRED_STREAM_TRIES = [
  // 1) 가장 공격적으로 고해상도/후면/연속초점 시도
  { width: 1920, height: 1080, fps: 30, label: "1080p 우선" },
  // 2) 다음으로 720p
  { width: 1280, height: 720,  fps: 30, label: "720p 우선" },
  // 3) 마지막: 기본(브라우저 결정)
  { width: null, height: null, fps: 30, label: "기본 해상도" }
];

// “멀리서” 인식에 특히 중요한 기준(실제 트랙 해상도가 너무 낮으면 재시도)
const MIN_GOOD_MAX_SIDE = 1000; // max(width,height) < 1000이면 보통 640x480급 가능성

// 캔버스 draw 시 대비/밝기 보강(BarcodeDetector/jsQR 모두에 효과)
const DRAW_FILTER = "contrast(1.45) brightness(1.10)";

/* ==========================
요소
========================== */
const video = document.getElementById("video");
const statusEl = document.getElementById("status");
const zoomInfoEl = document.getElementById("zoomInfo");
const hintEl = document.getElementById("hint");

const tapLayer = document.getElementById("tapToStart");
const startBtn = document.getElementById("startBtn");
const retryBtn = document.getElementById("retryBtn");
const startMsg = document.getElementById("startMsg");

const cameraSelect = document.getElementById("cameraSelect");
const torchBtn = document.getElementById("torchBtn");
const fsBtn = document.getElementById("fsBtn");

const flipHBtn = document.getElementById("flipHBtn");
const flipVBtn = document.getElementById("flipVBtn");
const flipResetBtn = document.getElementById("flipResetBtn");

/* ==========================
환경 감지: Windows에서는 전체화면 전환 X
========================== */
const IS_WINDOWS = (() => {
  const p = (navigator.platform || "").toLowerCase();
  const ua = (navigator.userAgent || "").toLowerCase();
  return p.includes("win") || ua.includes("windows");
})();

/* ==========================
✅ 반전 상태 (Windows용)
- 미리보기(video) + 인식(canvas) 모두 동일 반전
- localStorage 저장
========================== */
const FLIP_KEY = "qr_scanner_flip_v107";
let flipH = false; // 좌/우
let flipV = false; // 상/하

function loadFlipState(){
  try{
    const obj = JSON.parse(localStorage.getItem(FLIP_KEY) || "{}");
    flipH = !!obj.flipH;
    flipV = !!obj.flipV;
  }catch(e){
    flipH = false; flipV = false;
  }
}
function saveFlipState(){
  localStorage.setItem(FLIP_KEY, JSON.stringify({ flipH, flipV }));
}
function applyVideoFlip(){
  const sx = flipH ? -1 : 1;
  const sy = flipV ? -1 : 1;
  video.style.transform = `scale(${sx}, ${sy})`;
  flipHBtn.textContent = `좌/우 반전: ${flipH ? "ON" : "OFF"}`;
  flipVBtn.textContent = `상/하 반전: ${flipV ? "ON" : "OFF"}`;
}

/* ==========================
진동+효과음(유지)
========================== */
let audioCtx = null;
function vibrate(){ if(navigator.vibrate) navigator.vibrate([80,60,80]); }
function beep(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const A = audioCtx;
    const o = A.createOscillator();
    const g = A.createGain();
    o.type = "sine"; o.frequency.value = 880;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(A.destination);
    const t = A.currentTime;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    o.start(t); o.stop(t + 0.13);
  }catch(e){}
}

/* ==========================
유틸
========================== */
function pushHistory(text){
  const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
  const next = [text, ...arr.filter(x => x !== text)].slice(0, MAX_HISTORY);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
}
function makeUrl(raw){
  const v = (raw || "").trim();
  if(!v) return null;
  if(/^https?:\/\//i.test(v)) return v;
  if(/^[\w.-]+\.[a-z]{2,}([\/?#].*)?$/i.test(v)) return "https://" + v;
  if(!BASE_URL) return null;
  return BASE_URL + encodeURIComponent(v);
}
function setStatus(msg){ statusEl.textContent = msg; }
function clamp(v,min,max){ return Math.min(max, Math.max(min, v)); }

/* ==========================
전체화면
- Windows에서는 사용하지 않음(창 크기 유지)
========================== */
async function requestFullscreen(){
  if(IS_WINDOWS) return;
  const el = document.documentElement;
  try{
    if(!document.fullscreenElement && el.requestFullscreen) await el.requestFullscreen();
  }catch(e){}
}
fsBtn.addEventListener("click", () => requestFullscreen());

/* ==========================
QR 디코더
- 1) BarcodeDetector(있으면 사용)
- 2) 미지원 시 jsQR 폴백
========================== */
let detector = null;

function initBarcodeDetector(){
  if(!("BarcodeDetector" in window)) return false;
  try{
    detector = new BarcodeDetector({ formats:["qr_code"] });
    return true;
  }catch(e){
    detector = null;
    return false;
  }
}
function loadJsQR(){
  return new Promise((resolve, reject) => {
    if(window.jsQR){ resolve(true); return; }
    const s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js";
    s.onload = () => resolve(true);
    s.onerror = () => reject(new Error("jsQR load failed"));
    document.head.appendChild(s);
  });
}
async function initDecoder(){
  const okBD = initBarcodeDetector();
  if(okBD){
    hintEl.textContent = "디코더: BarcodeDetector";
    return true;
  }
  try{
    await loadJsQR();
    hintEl.textContent = "디코더: jsQR(폴백)";
    return true;
  }catch(e){
    hintEl.textContent = "디코더 로드 실패: 인터넷 연결 또는 브라우저 지원을 확인하세요.";
    return false;
  }
}

/* ==========================
카메라 목록 (2대 이상일 때만 선택 UI 표시)
========================== */
async function listCameras(){
  try{
    const devices = await navigator.mediaDevices.enumerateDevices();
    const cams = devices.filter(d => d.kind === "videoinput");
    cameraSelect.innerHTML = "";

    if(cams.length <= 1){
      cameraSelect.style.display = "none";
      return;
    }

    cameraSelect.style.display = "";
    cams.forEach((cam, idx) => {
      const opt = document.createElement("option");
      opt.value = cam.deviceId;
      opt.textContent = cam.label || `카메라 ${idx+1}`;
      cameraSelect.appendChild(opt);
    });

    const backIdx = cams.findIndex(c => /back|rear|후면|environment/i.test(c.label));
    if(backIdx >= 0) cameraSelect.selectedIndex = backIdx;

  }catch(e){
    cameraSelect.style.display = "none";
  }
}

/* ==========================
✅ 스트림 품질 진단/강화
========================== */
function getTrackSettings(track){
  try{ return (track && typeof track.getSettings==="function") ? (track.getSettings()||{}) : {}; }
  catch(e){ return {}; }
}
function getTrackCapabilities(track){
  try{ return (track && typeof track.getCapabilities==="function") ? (track.getCapabilities()||{}) : {}; }
  catch(e){ return {}; }
}
function maxSideOfSettings(st){
  const w = Number(st.width||0), h = Number(st.height||0);
  return Math.max(w,h);
}

/* ==========================
카메라 시작/정리
========================== */
let stream = null;
let videoTrack = null;
let navigating = false;

async function getUserMediaWithQuality(deviceId){
  // deviceId가 있으면 우선 deviceId 고정, 없으면 후면(environment) 우선
  for(let i=0;i<PREFERRED_STREAM_TRIES.length;i++){
    const t = PREFERRED_STREAM_TRIES[i];
    const constraints = {
      video: {
        ...(deviceId
          ? { deviceId: { exact: deviceId } }
          : { facingMode: { ideal: "environment" } }
        ),
        ...(t.width ? { width: { ideal: t.width }, height: { ideal: t.height } } : {}),
        frameRate: { ideal: t.fps, max: 60 },

        // 일부 브라우저에서 무시되지만, 지원 시 도움이 되는 힌트
        // (표준은 아니지만, 지원되는 경우가 있어 함께 둠)
        focusMode: "continuous",
        exposureMode: "continuous",
        whiteBalanceMode: "continuous"
      },
      audio: false
    };

    try{
      setStatus(`카메라 연결 중… (${t.label})`);
      const s = await navigator.mediaDevices.getUserMedia(constraints);
      return { stream: s, triedLabel: t.label };
    }catch(e){
      // 다음 시도
      if(i === PREFERRED_STREAM_TRIES.length-1) throw e;
    }
  }
  throw new Error("getUserMedia failed");
}

async function boostTrackIfPossible(track){
  // 가능한 범위에서 연속초점/노출/화이트밸런스/해상도 강화를 applyConstraints로 시도
  if(!track || typeof track.applyConstraints !== "function") return;

  const caps = getTrackCapabilities(track);
  const adv = [];

  // 연속 초점/노출/화이트밸런스 (지원되는 경우만)
  if(caps.focusMode && Array.isArray(caps.focusMode) && caps.focusMode.includes("continuous")) adv.push({ focusMode: "continuous" });
  if(caps.exposureMode && Array.isArray(caps.exposureMode) && caps.exposureMode.includes("continuous")) adv.push({ exposureMode: "continuous" });
  if(caps.whiteBalanceMode && Array.isArray(caps.whiteBalanceMode) && caps.whiteBalanceMode.includes("continuous")) adv.push({ whiteBalanceMode: "continuous" });

  // 선명도/대비 관련은 표준 caps가 아닌 경우가 많아 무리하게 넣지 않음

  // 해상도는 "ideal"로 한 번 더 강하게 요청(지원 시만)
  const desired = { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30, max: 60 } };

  try{
    if(adv.length){
      await track.applyConstraints({ ...desired, advanced: adv });
    }else{
      await track.applyConstraints(desired);
    }
  }catch(e){
    // 실패해도 무시(기기/브라우저마다 다름)
  }
}

async function startCamera(deviceId){
  stopAll();

  try{
    // 1) 고해상도 우선 다단계 요청
    const { stream: s, triedLabel } = await getUserMediaWithQuality(deviceId);
    stream = s;

    video.srcObject = stream;
    await video.play();

    // 2) 카메라 목록
    await listCameras();
    if(deviceId && cameraSelect.style.display !== "none") cameraSelect.value = deviceId;

    // 3) 실제 해상도 진단 + 필요시 강화/재시도
    videoTrack = stream.getVideoTracks()[0];
    const st0 = getTrackSettings(videoTrack);
    const ms0 = maxSideOfSettings(st0);

    // 먼저 applyConstraints로 "붙어있는 트랙"을 강화 시도
    await boostTrackIfPossible(videoTrack);

    const st1 = getTrackSettings(videoTrack);
    const ms1 = maxSideOfSettings(st1);

    // 너무 낮은 해상도면(주로 640x480) 한 번 더 "다음 단계"로 재요청
    // (특정 1대처럼 웹앱에서만 인식률이 떨어지는 케이스에 가장 효과적)
    if(ms1 && ms1 < MIN_GOOD_MAX_SIDE){
      // deviceId가 있다면 그대로 두고, 없다면 environment 재시도
      // (이때는 720p/1080p 우선이 이미 실패했을 가능성이 있어도 재시도 가치가 있음)
      stopAll();
      const { stream: s2 } = await getUserMediaWithQuality(deviceId || "");
      stream = s2;
      video.srcObject = stream;
      await video.play();
      videoTrack = stream.getVideoTracks()[0];
      await boostTrackIfPossible(videoTrack);
    }

    // 4) 컨트롤/스캔 시작
    setupCameraControls();
    startScanningLoop();

    // 상태 표시(실제 해상도 보여주기)
    const st = getTrackSettings(videoTrack);
    const w = st.width || video.videoWidth || "?";
    const h = st.height || video.videoHeight || "?";
    setStatus(`스캔 중… (실제 해상도: ${w}×${h})`);
    hintEl.textContent = `디코더: ${detector ? "BarcodeDetector" : (window.jsQR ? "jsQR(폴백)" : "미확인")} · 스트림: ${triedLabel}`;

    retryBtn.style.display = "none";
    startMsg.textContent = "";

  }catch(e){
    const name = e?.name || "";
    if(name === "NotAllowedError" || name === "SecurityError"){
      setStatus("카메라 권한이 필요합니다.");
      startMsg.innerHTML =
        `주소창 왼쪽의 <b>🔒(또는 카메라 아이콘)</b>에서 카메라 권한을 <b>허용</b>으로 바꾼 뒤<br/>아래 <b>권한 다시 요청</b>을 눌러주세요.`;
    }else{
      setStatus("카메라 실행 실패: 장치/HTTPS/권한 확인");
      startMsg.textContent = "카메라 연결, HTTPS 실행 여부를 확인하세요.";
    }
    retryBtn.style.display = "";
  }
}

function stopAll(){
  navigating = false;
  scanning = false;

  torchBtn.style.display = "none";
  zoomInfoEl.textContent = "";

  if(stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  video.srcObject = null;
  videoTrack = null;
}

/* ==========================
스캔 루프 (인식률 최우선)
- ROI 단계 + 다중 해상도
- BarcodeDetector 또는 jsQR
- ✅ 반전(flipH/flipV)을 캔버스 draw 단계에 적용
- ✅ 대비/밝기 전처리(DRAW_FILTER) 적용
========================== */
let scanning = false;
let lastScanTs = 0;
let lastValue = "";
let lastTime = 0;

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });

let digitalZoom = 1.0;

function drawRoiToCanvasWithFlip(vw, vh, sx, sy, roiW, roiH, dw, dh){
  canvas.width = dw;
  canvas.height = dh;

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,dw,dh);

  // ✅ 전처리 필터(대비/밝기)
  // 일부 브라우저에서만 적용되지만 적용 시 인식거리 향상에 도움이 됨
  ctx.filter = DRAW_FILTER;

  // 반전 적용
  if(flipH && flipV){
    ctx.translate(dw, dh);
    ctx.scale(-1, -1);
  }else if(flipH){
    ctx.translate(dw, 0);
    ctx.scale(-1, 1);
  }else if(flipV){
    ctx.translate(0, dh);
    ctx.scale(1, -1);
  }

  ctx.drawImage(video, sx, sy, roiW, roiH, 0, 0, dw, dh);

  // 필터 원복
  ctx.filter = "none";
  ctx.restore();
}

function startScanningLoop(){
  if(scanning) return;
  scanning = true;
  lastScanTs = 0;

  const useRVFC = typeof video.requestVideoFrameCallback === "function";

  const tick = async (nowMs) => {
    if(!scanning || navigating) return;
    if(!video.videoWidth || !video.videoHeight){
      scheduleNext();
      return;
    }

    const minInterval = 1000 / TARGET_SCAN_FPS;
    if(nowMs - lastScanTs < minInterval){
      scheduleNext();
      return;
    }
    lastScanTs = nowMs;

    const vw = video.videoWidth;
    const vh = video.videoHeight;

    let found = null;

    for(const passMaxSide of PASS_MAX_SIDES){
      for(const baseRatio of ROI_STEPS){
        const ratio = Math.min(1.0, baseRatio / digitalZoom);

        const roiW = Math.max(1, Math.floor(vw * ratio));
        const roiH = Math.max(1, Math.floor(vh * ratio));
        const sx = Math.floor((vw - roiW) / 2);
        const sy = Math.floor((vh - roiH) / 2);

        const maxSide = Math.min(passMaxSide, Math.max(roiW, roiH));
        const scale = maxSide / Math.max(roiW, roiH);
        const dw = Math.max(1, Math.floor(roiW * scale));
        const dh = Math.max(1, Math.floor(roiH * scale));

        drawRoiToCanvasWithFlip(vw, vh, sx, sy, roiW, roiH, dw, dh);

        if(detector){
          try{
            const codes = await detector.detect(canvas);
            if(codes && codes.length){
              const raw = (codes[0].rawValue || "").trim();
              if(raw){ found = raw; break; }
            }
          }catch(e){}
        }else if(window.jsQR){
          try{
            const img = ctx.getImageData(0, 0, dw, dh);
            const r = window.jsQR(img.data, dw, dh, { inversionAttempts: "attemptBoth" });
            if(r && r.data){
              found = (r.data || "").trim();
              if(found) break;
            }
          }catch(e){}
        }
      }
      if(found) break;
    }

    if(found){
      const now = Date.now();
      if(found !== lastValue || (now - lastTime) >= COOLDOWN_MS){
        lastValue = found;
        lastTime = now;

        pushHistory(found);

        const url = makeUrl(found);
        vibrate(); beep();

        if(!url){
          setStatus("인식 성공! 그러나 URL 변환 실패 (BASE_URL 설정 필요)");
          scheduleNext();
          return;
        }

        navigating = true;
        setStatus("이동 중…");
        location.href = url;
        return;
      }
    }

    scheduleNext();
  };

  const scheduleNext = () => {
    if(!scanning || navigating) return;
    if(useRVFC){
      video.requestVideoFrameCallback((_, meta) => {
        const t = meta?.mediaTime ? meta.mediaTime * 1000 : performance.now();
        tick(t);
      });
    }else{
      requestAnimationFrame((t) => tick(t));
    }
  };

  scheduleNext();
}

/* ==========================
줌/토치 컨트롤
========================== */
let zoomCaps = null;
let zoomValue = null;
let torchCaps = false;
let torchOn = false;

function setupCameraControls(){
  if(!stream) return;
  videoTrack = stream.getVideoTracks()[0];

  zoomCaps = null; zoomValue = null;
  torchCaps = false; torchOn = false;

  try{
    if(videoTrack && typeof videoTrack.getCapabilities === "function"){
      const caps = videoTrack.getCapabilities();
      if(caps && caps.zoom){
        zoomCaps = caps.zoom;
        const st = (typeof videoTrack.getSettings === "function") ? videoTrack.getSettings() : {};
        zoomValue = (st && typeof st.zoom === "number") ? st.zoom : (zoomCaps.min || 1);
        applyHardwareZoom(zoomValue);
      }
      torchCaps = !!caps?.torch;
    }
  }catch(e){}

  if(torchCaps){
    torchBtn.style.display = "";
    torchBtn.textContent = "토치 OFF";
    torchBtn.onclick = async () => {
      torchOn = !torchOn;
      try{
        await videoTrack.applyConstraints({ advanced: [{ torch: torchOn }] });
        torchBtn.textContent = torchOn ? "토치 ON" : "토치 OFF";
      }catch(e){
        torchOn = !torchOn;
      }
    };
  }else{
    torchBtn.style.display = "none";
  }

  // Windows: 전체화면 숨김 유지
  fsBtn.style.display = IS_WINDOWS ? "none" : "";

  // ✅ Windows에서만 반전 버튼 표시
  if(IS_WINDOWS){
    flipHBtn.style.display = "";
    flipVBtn.style.display = "";
    flipResetBtn.style.display = "";
  }else{
    flipHBtn.style.display = "none";
    flipVBtn.style.display = "none";
    flipResetBtn.style.display = "none";
  }

  applyVideoFlip();

  updateZoomInfo();
  enableZoomGestures();
}

function quantizeHardwareZoom(v){
  if(!zoomCaps) return v;
  const step = zoomCaps.step || 0.1;
  const q = Math.round(v / step) * step;
  return clamp(q, zoomCaps.min, zoomCaps.max);
}
async function applyHardwareZoom(v){
  if(!videoTrack || !zoomCaps) return;
  zoomValue = quantizeHardwareZoom(v);
  try{
    await videoTrack.applyConstraints({ advanced: [{ zoom: zoomValue }] });
    updateZoomInfo();
  }catch(e){
    zoomCaps = null;
    zoomValue = null;
    updateZoomInfo();
  }
}
function applyDigitalZoom(z){
  digitalZoom = clamp(z, DIGITAL_ZOOM_MIN, DIGITAL_ZOOM_MAX);
  updateZoomInfo();
}
function updateZoomInfo(){
  const hw = zoomCaps ? `하드웨어 줌: ${zoomValue.toFixed(2)}` : "하드웨어 줌: 미지원";
  const dz = `디지털 줌: ${digitalZoom.toFixed(2)}`;
  zoomInfoEl.textContent = `${hw} · ${dz}  |  모바일: 핀치/드래그, PC: 휠/드래그`;
}

/* ✅ 반전 버튼 이벤트 */
flipHBtn.addEventListener("click", () => {
  flipH = !flipH;
  saveFlipState();
  applyVideoFlip();
});
flipVBtn.addEventListener("click", () => {
  flipV = !flipV;
  saveFlipState();
  applyVideoFlip();
});
flipResetBtn.addEventListener("click", () => {
  flipH = false;
  flipV = false;
  saveFlipState();
  applyVideoFlip();
});

/* 포인터 제스처 + 휠 */
const pointers = new Map();
let startZoomHW = null;
let startZoomDZ = null;
let startDist = null;
let startY = null;

function distance(a,b){
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return Math.hypot(dx,dy);
}

function enableZoomGestures(){
  video.onpointerdown = null;
  video.onpointermove = null;
  video.onpointerup = null;
  video.onpointercancel = null;
  video.onpointerleave = null;

  video.addEventListener("pointerdown", (e) => {
    video.setPointerCapture?.(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    startZoomHW = zoomValue;
    startZoomDZ = digitalZoom;

    if(pointers.size === 1){
      startY = e.clientY;
      startDist = null;
    }else if(pointers.size === 2){
      const pts = Array.from(pointers.values());
      startDist = distance(pts[0], pts[1]);
      startY = null;
    }
  });

  video.addEventListener("pointermove", (e) => {
    if(!pointers.has(e.pointerId)) return;
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if(pointers.size === 1 && startY != null){
      const dy = startY - e.clientY;
      const delta = dy / 260;
      if(zoomCaps){
        const range = (zoomCaps.max - zoomCaps.min);
        applyHardwareZoom((startZoomHW ?? zoomValue ?? zoomCaps.min) + range * delta * 0.35);
      }else{
        applyDigitalZoom((startZoomDZ ?? digitalZoom) + delta * 0.9);
      }
    }

    if(pointers.size === 2 && startDist != null){
      const pts = Array.from(pointers.values());
      const d = distance(pts[0], pts[1]);
      const ratio = d / startDist;
      if(zoomCaps){
        applyHardwareZoom((startZoomHW ?? zoomValue ?? zoomCaps.min) * ratio);
      }else{
        applyDigitalZoom((startZoomDZ ?? digitalZoom) * ratio);
      }
    }
  });

  const end = (e) => {
    pointers.delete(e.pointerId);
    if(pointers.size < 2) startDist = null;
    if(pointers.size === 0){ startY = null; startDist = null; }
  };

  video.addEventListener("pointerup", end);
  video.addEventListener("pointercancel", end);
  video.addEventListener("pointerleave", end);

  video.onwheel = (e) => {
    e.preventDefault();
    const dir = Math.sign(e.deltaY);
    if(zoomCaps){
      const step = zoomCaps.step || 0.1;
      applyHardwareZoom((zoomValue ?? zoomCaps.min) + dir * step);
    }else{
      applyDigitalZoom(digitalZoom + dir * 0.12);
    }
  };
}

카메라 전환

cameraSelect.addEventListener("change", async () => {
  const id = cameraSelect.value;
  if(!id) return;
  await startCamera(id);
});

권한 재요청 버튼
========================== */
retryBtn.addEventListener("click", async () => {
  retryBtn.style.display = "none";
  startMsg.textContent = "";
  await startFlow();
});

/* ==========================
시작 흐름
========================== */
async function startFlow(){
  await requestFullscreen();

  try{
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === "suspended") await audioCtx.resume();
  }catch(e){}

  const okDecoder = await initDecoder();
  if(!okDecoder){
    setStatus("QR 인식 준비 실패");
    retryBtn.style.display = "";
    return;
  }

  await listCameras();

  tapLayer.style.display = "none";

  await startCamera(cameraSelect.style.display === "none" ? "" : (cameraSelect.value || ""));
}

startBtn.addEventListener("click", startFlow);

tapLayer.addEventListener("click", (e) => {
  if(e.target === startBtn || e.target === retryBtn) return;
  startBtn.click();
});

/* 초기 목록 + ✅ 반전 상태 로드 */
listCameras();
loadFlipState();
applyVideoFlip();

window.addEventListener("beforeunload", stopAll);
